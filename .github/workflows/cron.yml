name: Actualizar Grilla TeleRed Diaria

on:
  schedule:
    # Corre todos los días a las 05:00 AM hora de Argentina (08:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:

# Permisos necesarios para que el Bot publique en GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Clonar repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🎭 Instalar navegadores de Playwright
      run: |
        python -m playwright install chromium

    - name: 🔊 Parche de dependencias para Ubuntu 24.04
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2t64 libgbm1

    - name: ⚽ Correr script raspador
      run: |
        python grilla_telered.py
        # Creamos una carpeta 'public' y movemos el XML ahí para Pages
        mkdir -p public
        mv grilla_telered.xml public/

    - name: 🚀 Publicar en GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        keep_files: true